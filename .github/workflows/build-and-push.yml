name: Release and Build Docker Image (Angular)

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_v.outputs.VERSION }}
      skipped: ${{ steps.check_tag.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v4 for stability
        with:
          fetch-depth: 0

      - name: Get Version from package.json
        id: get_v
        run: |
          # Extract version using jq
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Tag exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.get_v.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.get_v.outputs.VERSION }} already exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.get_v.outputs.VERSION }}" \
            --title "v${{ steps.get_v.outputs.VERSION }}" \
            --generate-notes \
            --latest

  build-and-push:
    needs: release
    if: needs.release.outputs.skipped == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Ensure this path points to your Angular Dockerfile
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ljt-mes-platform-ui:v${{ needs.release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ljt-mes-platform-ui:latest