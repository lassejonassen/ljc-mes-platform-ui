<div class="card">
    <div class="font-semibold text-xl mb-4">Process Segments</div>

    <p-toolbar class="mb-6">
        <ng-template #start>
            <p-button label="Add" icon="pi pi-plus" class="mr-2" (onClick)="showProcessSegmentDialog()" />
            <p-button label="Delete" icon="pi pi-trash" severity="danger" (onClick)="deleteSelected()" [disabled]="!selectedNodes" />
        </ng-template>
        <ng-template #end>
            <p-button label="Export" icon="pi pi-download" severity="secondary" (onClick)="exportCSV()" />
        </ng-template>
    </p-toolbar>

    <p-treeTable
        #tt
        [value]="groupedProcessSegments()"
        [paginator]="true"
        [rows]="10"
        [globalFilterFields]="['sku', 'name', 'state', 'version']"
        selectionMode="checkbox"
        [(selection)]="selectedNodes"
        [scrollable]="true"
        scrollHeight="600px"
        class="custom-align-table"
    >
        <ng-template #caption>
            <div class="flex items-center justify-between">
                <h5 class="m-0">Manage Process Segments</h5>
                <p-iconfield>
                    <p-inputicon class="pi pi-search" />
                    <input pInputText type="text" (input)="onGlobalFilter(tt, $event)" placeholder="Search Process Segments..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="width: 40%">Name</th>
                <th style="width: 15%">Latest State</th>
                <th style="width: 15%">Latest Version</th>
                <th style="width: 20%">Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-rowNode let-rowData="rowData">
            <tr [ttRow]="rowNode" [class.parent-row]="rowData.isGroup">
                <td style="width: 40%">
                    <div class="flex items-center w-full">
                        <p-treeTableToggler [rowNode]="rowNode" />
                        <p-treeTableCheckbox [value]="rowNode" class="mr-3" />

                        <div class="flex items-center gap-3 truncate">
                            <span class="sku-text" [class.font-bold]="rowData.isGroup"> {{ rowData.sku }} </span>
                            <span class="text-secondary text-sm"> {{ rowData.name }} </span>
                        </div>
                    </div>
                </td>
                <td style="width: 15%">
                    <p-tag [value]="rowData.state" [severity]="getSeverity(rowData.state)" />
                </td>
                <td style="width: 15%">
                    <span class="version-badge"> v{{ rowData.version }} </span>
                </td>
                <td style="width: 20%">
                    @if (!rowData.isGroup) {
                    <div class="flex gap-1">
                        <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info" [routerLink]="['/recipe-management/process-segments', rowData.id]" pTooltip="View Details" />
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="warn" (onClick)="showProcessSegmentDialog(rowData)" pTooltip="Edit Version" />
                        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="openDeleteDialog(rowData)" pTooltip="Delete Version" />
                    </div>
                    } @else {
                    <span class="text-xs text-400 italic">Expand to manage versions</span>
                    }
                </td>
            </tr>
        </ng-template>
    </p-treeTable>
</div>

<p-confirmdialog />
<p-toast />

<p-toast />
