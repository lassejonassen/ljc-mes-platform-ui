<div class="p-fluid">
    <form [formGroup]="form" (ngSubmit)="save()">
        <div class="card flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label for="name">Name</label>
                <input id="name" type="text" pInputText formControlName="name" [readonly]="isEditMode()" [invalid]="isInvalid('name')" />
                @if(isEditMode()) {
                <small id="username-help">The field is Read Only in when editing</small>
                }
            </div>
            <div class="flex flex-col gap-2">
                <label for="defaultValue">Default value</label>
                <input id="defaultValue" type="text" pInputText formControlName="defaultValue" [invalid]="isInvalid('defaultValue')" />
            </div>
            <div class="flex flex-col gap-2">
                <label for="description">Description</label>
                <input id="description" type="text" pInputText formControlName="description" [invalid]="isInvalid('description')" />
            </div>
            <div class="flex flex-col gap-2">
                <label for="dataType">Data Type</label>
                <input id="dataType" type="text" pInputText formControlName="dataType" [invalid]="isInvalid('dataType')" />
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex items-center">
                    <p-checkbox inputId="isReadOnly" formControlName="isReadOnly" [binary]="true" />
                    <label for="isReadOnly" class="ml-2">Read Only</label>
                </div>
            </div>
        </div>
        <div class="flex justify-content-end gap-2 mt-4">
            <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" type="button" (click)="cancel()"></button>
            <button pButton [label]="isEditMode() ? 'Update' : 'Create'" icon="pi pi-check" type="submit" [disabled]="form.invalid"></button>
        </div>
    </form>
</div>
